name: Monitor TG vacancies

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python monitor.py

      - name: Commit updated seen_ids.json (if changed)
        run: |
          git config user.name "vacancy-monitor-bot"
          git config user.email "actions@github.com"
          git add seen_ids.json
          git diff --staged --quiet || git commit -m "Update seen_ids.json [skip ci]"
          git push
